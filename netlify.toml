# ================================================================
# ServisTek PWA — Konfigurasi Netlify
# ================================================================
# File ini mengatur bagaimana Netlify men-deploy ServisTek
# setiap kali ada push ke branch main di GitHub.
# ================================================================

[build]
  # Tidak ada build step — ServisTek adalah static HTML murni
  publish = "."

# Header keamanan dan PWA
[[headers]]
  for = "/*"
  [headers.values]
    # Keamanan dasar
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Izinkan Service Worker berjalan di root scope
    Service-Worker-Allowed = "/"

# Cache agresif untuk icons (jarang berubah)
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service Worker TIDAK boleh di-cache lama (harus selalu fresh)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# manifest.json — cache pendek
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# index.html — cache pendek agar update cepat terdeteksi
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect semua ke index.html (SPA mode)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
